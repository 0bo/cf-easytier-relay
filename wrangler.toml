name = "cf-easytier-relay"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects 绑定：每个虚拟网络对应一个 DO 实例
[[durable_objects.bindings]]
name = "EASYTIER_RELAY"
class_name = "EasyTierRelayDO"

# Durable Object 迁移声明
[[migrations]]
tag = "v1"
new_sqlite_classes = ["EasyTierRelayDO"]

# 可选：观察 WebSocket 连接数的 KV 命名空间（留空可注释掉）
# [[kv_namespaces]]
# binding = "RELAY_STATS"
# id = "your-kv-namespace-id"

# 环境变量（也可在 Cloudflare Dashboard 中设置）
[vars]
# 默认网络名称和密钥（私有模式鉴权用，建议在 Dashboard 中用加密变量覆盖）
DEFAULT_NETWORK_NAME = "change-me-network"
DEFAULT_NETWORK_SECRET = "change-me-secret"

# 单个 DO 实例最大并发 WebSocket 连接数
MAX_CONNECTIONS_PER_INSTANCE = "128"

# WebSocket 空闲超时（秒），超时后自动断开
IDLE_TIMEOUT_SECONDS = "300"

# 是否开启详细日志
DEBUG_LOG = "false"
