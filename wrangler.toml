name = "cf-easytier-relay"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects 绑定：每个虚拟网络对应一个 DO 实例
[[durable_objects.bindings]]
name = "EASYTIER_RELAY"
class_name = "EasyTierRelayDO"

# Durable Object 迁移声明
[[migrations]]
tag = "v1"
new_sqlite_classes = ["EasyTierRelayDO"]

# 环境变量
# -------------------------------------------------------
# 以下变量可在 Cloudflare Dashboard 中配置：
#   Workers & Pages -> cf-easytier-relay -> Settings -> Variables
#
# 必须配置的环境变量（请在 Dashboard 中设置，建议勾选 Encrypt 加密）：
#   DEFAULT_NETWORK_NAME    你的 EasyTier 网络名称
#   DEFAULT_NETWORK_SECRET  你的 EasyTier 网络密钥
#
# 可选环境变量（下方为默认值，可按需在 Dashboard 中覆盖）：
[vars]
MAX_CONNECTIONS_PER_INSTANCE = "128"
IDLE_TIMEOUT_SECONDS = "300"
DEBUG_LOG = "false"
